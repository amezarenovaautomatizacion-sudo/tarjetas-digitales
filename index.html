<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0DB8D3" />
    <meta name="description" content="Crea tarjetas digitales profesionales con plantillas personalizables. Diseños modernos para negocios y profesionales." />
    <meta name="keywords" content="tarjetas digitales, plantillas, negocios, diseño web, tarjetas virtuales" />
    <meta name="author" content="Tarjetas Renova" />
    <meta name="robots" content="index, follow" />
    
    <title>Tarjetas Renova - Plantillas Profesionales para Tarjetas Digitales</title>
    
    <!-- Preconnect a Google Fonts para mejor rendimiento -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tarjetas-renova.vercel.app/" />
    <meta property="og:title" content="Tarjetas Renova - Plantillas Profesionales" />
    <meta property="og:description" content="Crea tarjetas digitales profesionales con plantillas personalizables. Diseños modernos para negocios y profesionales." />
    <meta property="og:image" content="https://tarjetas-renova.vercel.app/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tarjetas-renova.vercel.app/" />
    <meta property="twitter:title" content="Tarjetas Renova - Plantillas Profesionales" />
    <meta property="twitter:description" content="Crea tarjetas digitales profesionales con plantillas personalizables." />
    <meta property="twitter:image" content="https://tarjetas-renova.vercel.app/og-image.jpg" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/src/styles/global.css" as="style" />
    <link rel="preload" href="/src/styles/custom-bootstrap.scss" as="style" />
    
    <!-- Estilos críticos inline para evitar FOUC (Flash of Unstyled Content) -->
    <style>
      /* Estilos críticos para renderizado inicial */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0e1a;
        color: #ffffff;
        min-height: 100vh;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      body.loaded {
        opacity: 1;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading spinner crítico */
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0e1a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .initial-loading .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(13, 184, 211, 0.2);
        border-top-color: #0DB8D3;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Prevenir scroll cuando se carga */
      .no-scroll {
        overflow: hidden;
      }
    </style>
    
    <script>
      (function() {
        // Prevenir FOUC
        document.documentElement.classList.add('no-scroll');
        
        // Tema oscuro por defecto
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        
        // Marcar cuando el DOM está listo
        window.addEventListener('DOMContentLoaded', () => {
          setTimeout(() => {
            document.body.classList.add('loaded');
            document.documentElement.classList.remove('no-scroll');
          }, 100);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading inicial para mejor experiencia de usuario -->
      <div class="initial-loading" id="initial-loading">
        <div class="spinner"></div>
      </div>
    </div>
    
    <!-- Script principal - Vite se encarga de importar los estilos correctamente -->
    <script type="module">
      // Importar la aplicación principal
      import('./src/main.tsx').catch((error) => {
        console.error('Error al cargar la aplicación:', error);
        const loadingElement = document.getElementById('initial-loading');
        if (loadingElement) {
          loadingElement.innerHTML = `
            <div style="text-align: center; padding: 2rem;">
              <h2 style="color: #ef4444;">Error al cargar la aplicación</h2>
              <p style="color: #9ca3af;">Por favor, recarga la página</p>
              <button onclick="location.reload()" style="
                background: linear-gradient(135deg, #0DB8D3, #1B7FDC);
                border: none;
                color: white;
                padding: 0.75rem 1.5rem;
                border-radius: 50px;
                cursor: pointer;
                margin-top: 1rem;
                font-weight: 600;
              ">Recargar</button>
            </div>
          `;
        }
      });
    </script>
    
    <!-- Script para ocultar el loading cuando la app esté lista -->
    <script>
      // Observer para detectar cuando React ha montado la app
      const observer = new MutationObserver((mutations) => {
        const root = document.getElementById('root');
        if (root && root.children.length > 1) {
          const loadingElement = document.getElementById('initial-loading');
          if (loadingElement) {
            loadingElement.style.opacity = '0';
            setTimeout(() => {
              if (loadingElement && loadingElement.parentNode) {
                loadingElement.remove();
              }
            }, 300);
            observer.disconnect();
          }
        }
      });
      
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      
      // Timeout de seguridad para remover loading después de 5 segundos
      setTimeout(() => {
        const loadingElement = document.getElementById('initial-loading');
        if (loadingElement && loadingElement.parentNode) {
          loadingElement.style.opacity = '0';
          setTimeout(() => {
            if (loadingElement && loadingElement.parentNode) {
              loadingElement.remove();
            }
          }, 300);
        }
        observer.disconnect();
      }, 5000);
    </script>
  </body>
</html>
