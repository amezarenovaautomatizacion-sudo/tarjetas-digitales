<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0DB8D3" />
    <meta name="description" content="TapCards - Crea tarjetas digitales profesionales con plantillas personalizables. Diseños modernos para negocios y profesionales." />
    <meta name="keywords" content="tarjetas digitales, plantillas, negocios, diseño web, tarjetas virtuales, TapCards" />
    <meta name="author" content="TapCards" />
    <meta name="robots" content="index, follow" />
    
    <title>TapCards - Plantillas Profesionales para Tarjetas Digitales</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tapcards.vercel.app/" />
    <meta property="og:title" content="TapCards - Plantillas Profesionales para Tarjetas Digitales" />
    <meta property="og:description" content="Crea tarjetas digitales profesionales con plantillas personalizables. Diseños modernos para negocios y profesionales." />
    <meta property="og:image" content="https://tapcards.vercel.app/og-image.jpg" />
    
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tapcards.vercel.app/" />
    <meta property="twitter:title" content="TapCards - Plantillas Profesionales para Tarjetas Digitales" />
    <meta property="twitter:description" content="Crea tarjetas digitales profesionales con plantillas personalizables." />
    <meta property="twitter:image" content="https://tapcards.vercel.app/og-image.jpg" />
    
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <link rel="preload" href="/src/styles/global.css" as="style" />
    <link rel="preload" href="/src/styles/custom-bootstrap.scss" as="style" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0e1a;
        color: #ffffff;
        min-height: 100vh;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      body.loaded {
        opacity: 1;
      }
      
      #root {
        min-height: 100vh;
      }
      
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0e1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 1rem;
      }
      
      .initial-loading .logo-loading {
        width: 64px;
        height: 64px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      .initial-loading .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(13, 184, 211, 0.2);
        border-top-color: #0DB8D3;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      .initial-loading .loading-text {
        color: #9ca3af;
        font-size: 0.875rem;
        margin-top: 1rem;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      
      .no-scroll {
        overflow: hidden;
      }
    </style>
    
    <script>
      (function() {
        document.documentElement.classList.add('no-scroll');
        
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        
        window.addEventListener('DOMContentLoaded', () => {
          setTimeout(() => {
            document.body.classList.add('loaded');
            document.documentElement.classList.remove('no-scroll');
          }, 100);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading" id="initial-loading">
        <svg class="logo-loading" width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" stroke="rgba(13, 184, 211, 0.2)" stroke-width="2" fill="none"/>
          <circle cx="50" cy="50" r="45" stroke="url(#gradient)" stroke-width="3" stroke-dasharray="283" stroke-dashoffset="70" fill="none"/>
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0DB8D3"/>
              <stop offset="100%" stop-color="#1B7FDC"/>
            </linearGradient>
          </defs>
          <text x="50" y="68" text-anchor="middle" fill="#0DB8D3" font-size="32" font-weight="bold" font-family="Inter, sans-serif">T</text>
        </svg>
        <div class="spinner"></div>
        <div class="loading-text">Cargando TapCards...</div>
      </div>
    </div>
    
    <script type="module">
      import('./src/main.tsx').catch((error) => {
        console.error('Error al cargar la aplicación:', error);
        const loadingElement = document.getElementById('initial-loading');
        if (loadingElement) {
          loadingElement.innerHTML = `
            <div style="text-align: center; padding: 2rem;">
              <svg width="64" height="64" viewBox="0 0 100 100" fill="none" style="margin-bottom: 1rem;">
                <circle cx="50" cy="50" r="45" stroke="#ef4444" stroke-width="2" fill="none"/>
                <text x="50" y="68" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="bold">!</text>
              </svg>
              <h2 style="color: #ef4444;">Error al cargar la aplicación</h2>
              <p style="color: #9ca3af;">Por favor, recarga la página</p>
              <button onclick="location.reload()" style="
                background: linear-gradient(135deg, #0DB8D3, #1B7FDC);
                border: none;
                color: white;
                padding: 0.75rem 1.5rem;
                border-radius: 50px;
                cursor: pointer;
                margin-top: 1rem;
                font-weight: 600;
              ">Recargar</button>
            </div>
          `;
        }
      });
    </script>
    
    <script>
      const observer = new MutationObserver((mutations) => {
        const root = document.getElementById('root');
        if (root && root.children.length > 1) {
          const loadingElement = document.getElementById('initial-loading');
          if (loadingElement) {
            loadingElement.style.opacity = '0';
            setTimeout(() => {
              if (loadingElement && loadingElement.parentNode) {
                loadingElement.remove();
              }
            }, 300);
            observer.disconnect();
          }
        }
      });
      
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      
      setTimeout(() => {
        const loadingElement = document.getElementById('initial-loading');
        if (loadingElement && loadingElement.parentNode) {
          loadingElement.style.opacity = '0';
          setTimeout(() => {
            if (loadingElement && loadingElement.parentNode) {
              loadingElement.remove();
            }
          }, 300);
        }
        observer.disconnect();
      }, 5000);
    </script>
  </body>
</html>
